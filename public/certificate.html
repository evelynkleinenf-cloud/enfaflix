<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enfaflix | Certificado</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="certificate">
    <header class="site-header">
      <div class="container nav">
        <a href="/" class="brand brand-with-logo">
          <img src="/logo.png" alt="Logo Enfaflix" class="brand-logo" />
          <span>Enfaflix</span>
        </a>
        <nav class="site-nav" data-site-nav></nav>
      </div>
    </header>
    <main class="certificate-page">
      <section class="certificate-card">
        <span class="eyebrow">Certificado de conclusão</span>
        <h1 id="certificate-student">Carregando certificado...</h1>
        <p>Concluiu com aproveitamento o curso</p>
        <h2 id="certificate-course"></h2>
        <p id="certificate-date"></p>
        <p id="certificate-code" class="certificate-code"></p>
      </section>
    </main>
    <script src="/script.js"></script>
  </body>
</html>
